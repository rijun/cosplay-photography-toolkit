{% extends "base.html" %}

{% block title %}{{ gallery.name }}{% endblock %}

{% block content %}
<div x-data="galleryApp()" class="gallery-container">
    <h1>{{ gallery.name }}</h1>
    <p class="gallery-tagline">~ select your favorite moments ~</p>

    <div class="photo-grid">
        {% for photo in photos %}
        <div class="photo-card"
             x-data="{ photoId: {{ photo.id }}, photoIndex: {{ forloop.counter0 }} }"
             data-photo-id="{{ photo.id }}"
             data-preview-url="{{ photo.preview_url }}"
             data-filename="{{ photo.filename }}"
             data-selected="{{ photo.is_selected|yesno:'true,false' }}"
             :class="{ 'selected': selections[photoId] }">
            <img
                src="{{ photo.thumbnail_url }}"
                alt="{{ photo.filename }}"
                loading="lazy"
                @click="openLightbox(photoIndex)"
            >
            <div class="photo-actions">
                <button
                    @click="toggleSelect(photoId)"
                    :class="{ 'active': selections[photoId] }"
                    class="btn-select"
                >
                    <span x-text="selections[photoId] ? '&#9829;' : '&#9825;'">{% if photo.is_selected %}&#9829;{% else %}&#9825;{% endif %}</span>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Lightbox -->
    <div x-show="lightboxOpen" x-cloak class="lightbox" @keydown.escape.window="closeLightbox()" @keydown.left.window="prevPhoto()" @keydown.right.window="nextPhoto()">
        <div class="lightbox-backdrop" @click="closeLightbox()"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" @click="closeLightbox()">&times;</button>
            <button class="lightbox-prev" @click="prevPhoto()">&lsaquo;</button>
            <img :src="lightboxPhoto?.preview_url" :alt="lightboxPhoto?.filename" class="lightbox-image">
            <button class="lightbox-next" @click="nextPhoto()">&rsaquo;</button>

            <div class="lightbox-sidebar">
                <p x-text="lightboxPhoto?.filename" class="photo-filename"></p>
                <button
                    @click="toggleSelect(lightboxPhoto?.id)"
                    :class="{ 'active': selections[lightboxPhoto?.id] }"
                    class="btn-select"
                >
                    <span x-text="selections[lightboxPhoto?.id] ? '&#9829; Selected' : '&#9825; Select'"></span>
                </button>

                <div class="comments-section">
                    <h3>Comments</h3>
                    <template x-for="comment in (lightboxPhoto?.comments || [])" :key="comment.id">
                        <div class="comment">
                            <p x-text="comment.body"></p>
                        </div>
                    </template>
                    <form @submit.prevent="addComment()" class="comment-form">
                        <textarea x-model="newComment" placeholder="Leave a comment..." rows="2"></textarea>
                        <button type="submit" :disabled="!newComment.trim()">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            // Does this cookie string begin with the name we want?
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function galleryApp() {
    const token = "{{ gallery.token }}";
    const csrfToken = getCookie('csrftoken');
    const cards = [...document.querySelectorAll('.photo-card')];

    const selections = {};
    cards.forEach(el => {
        selections[parseInt(el.dataset.photoId)] = el.dataset.selected === 'true';
    });

    return {
        selections,
        lightboxOpen: false,
        currentIndex: 0,
        lightboxPhoto: null,
        newComment: "",

        async openLightbox(index) {
            this.currentIndex = index;
            await this._loadLightboxPhoto(index);
            this.lightboxOpen = true;
            // TODO: open lightbox immediately and fetch comments in background for better responsiveness on high-latency connections
        },
        closeLightbox() {
            this.lightboxOpen = false;
        },
        async prevPhoto() {
            if (this.currentIndex > 0) {
                this.currentIndex--;
                await this._loadLightboxPhoto(this.currentIndex);
            }
        },
        async nextPhoto() {
            if (this.currentIndex < cards.length - 1) {
                this.currentIndex++;
                await this._loadLightboxPhoto(this.currentIndex);
            }
        },

        async _loadLightboxPhoto(index) {
            const card = cards[index];
            const id = parseInt(card.dataset.photoId);
            this.lightboxPhoto = {
                id,
                preview_url: card.dataset.previewUrl,
                filename: card.dataset.filename,
                comments: [],
            };
            const res = await fetch(`/g/${token}/photos/${id}/comments`);
            this.lightboxPhoto.comments = await res.json();
        },

        async toggleSelect(photoId) {
            const res = await fetch(`/g/${token}/photos/${photoId}/select`, {
                method: "POST",
                headers: { "X-CSRFToken": csrfToken },
            });
            const data = await res.json();
            this.selections[photoId] = data.selected;
        },

        async addComment() {
            const body = this.newComment.trim();
            if (!body) return;
            const res = await fetch(`/g/${token}/photos/${this.lightboxPhoto.id}/comment`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrfToken,
                },
                body: JSON.stringify({ body }),
            });
            const comment = await res.json();
            this.lightboxPhoto.comments.push(comment);
            this.newComment = "";
        },
    };
}
</script>
{% endblock %}
