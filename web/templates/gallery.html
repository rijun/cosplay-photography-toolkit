{% extends "base.html" %}

{% block title %}{{ gallery.name }}{% endblock %}

{% block content %}
<div x-data="galleryApp()" class="gallery-container" @keydown.escape.window="onEscape()">
    <h1>{{ gallery.name }}</h1>
    <p class="gallery-tagline">~ select your favorite moments ~</p>

    <!-- Flag Picker -->
    <div class="flag-picker">
        <span class="flag-picker-label">your color</span>
        <div class="flag-picker-dots">
            <template x-for="f in flagDefs" :key="f.color">
                <button
                    class="flag-dot"
                    :class="{ 'active': activeFlag === f.color, 'flag-dot--final': f.color === 0 }"
                    :style="`--dot-color: ${f.hex}; --dot-glow: ${f.glow}`"
                    :title="f.color === 0 ? 'final pick (photographer)' : `${f.label} — pick your color, each person uses a different one`"
                    @click="setActiveFlag(f.color)"
                >
                    <span class="flag-dot-inner"></span>
                    <span class="flag-dot-label" x-text="f.label"></span>
                </button>
            </template>
        </div>
        <span class="flag-picker-hint">each person picks a color</span>
    </div>

    <!-- Toolbar -->
    <div class="gallery-toolbar">
        <button @click="toggleSelectMode()" :class="{ 'active': selectMode }" class="btn-toolbar">
            <span x-text="selectMode ? 'Cancel' : 'Select'"></span>
        </button>
    </div>

    <div class="photo-grid">
        {% for photo in photos %}
        <div class="photo-card"
             x-data="{ photoId: {{ photo.id }}, photoIndex: {{ forloop.counter0 }} }"
             :class="{ 'photo-card--selected': isSelected(photoId), 'photo-card--select-mode': selectMode }"
             data-photo-id="{{ photo.id }}"
             data-preview-url="{{ photo.preview_url }}"
             data-filename="{{ photo.filename }}"
             data-flags="{{ photo.flags }}">
            <img
                src="{{ photo.thumbnail_url }}"
                alt="{{ photo.filename }}"
                loading="lazy"
                @click="selectMode ? toggleSelect(photoId) : openLightbox(photoIndex)"
            >
            <!-- Select mode checkmark -->
            <div class="card-select-overlay" x-show="selectMode" style="pointer-events: none">
                <span class="card-checkmark" x-show="isSelected(photoId)">&#10003;</span>
            </div>
            <!-- Flag dots on card -->
            <div class="card-flags">
                <template x-for="f in flagDefs" :key="f.color">
                    <span
                        class="card-flag-dot"
                        :style="`--dot-color: ${f.hex}`"
                        x-show="photoFlags[photoId]?.includes(f.color)"
                        x-transition.opacity
                    ></span>
                </template>
            </div>
            <div class="photo-actions">
                <button
                    @click="toggleFlag(photoId)"
                    :class="{ 'active': photoFlags[photoId]?.includes(activeFlag) }"
                    :style="activeFlagStyle"
                    class="btn-select"
                >
                    <span x-text="photoFlags[photoId]?.includes(activeFlag) ? '&#9829;' : '&#9825;'">&#9825;</span>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Selection action bar -->
    <div x-show="selectedPhotos.length > 0" x-cloak x-transition class="selection-bar">
        <span class="selection-count" x-text="`${selectedPhotos.length} selected`"></span>
        <div class="selection-actions">
            <button @click="selectedPhotos = []" class="btn-selection">Clear</button>
        </div>
    </div>

    <!-- Lightbox -->
    <div x-show="lightboxOpen" x-cloak class="lightbox" @keydown.left.window="prevPhoto()" @keydown.right.window="nextPhoto()">
        <div class="lightbox-backdrop" @click="closeLightbox()"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" @click="closeLightbox()">&times;</button>
            <button class="lightbox-prev" @click="prevPhoto()">&lsaquo;</button>
            <img :src="lightboxPhoto?.preview_url" :alt="lightboxPhoto?.filename" class="lightbox-image">
            <button class="lightbox-next" @click="nextPhoto()">&rsaquo;</button>

            <div class="lightbox-sidebar">
                <p x-text="lightboxPhoto?.filename" class="photo-filename"></p>

                <!-- Flag toggles in lightbox -->
                <div class="lightbox-flags">
                    <template x-for="f in flagDefs" :key="f.color">
                        <button
                            class="lightbox-flag-btn"
                            :class="{ 'active': lightboxPhoto && photoFlags[lightboxPhoto.id]?.includes(f.color), 'lightbox-flag-btn--final': f.color === 0 }"
                            :style="`--flag-color: ${f.hex}; --flag-glow: ${f.glow}`"
                            @click="toggleFlag(lightboxPhoto?.id, f.color)"
                        >
                            <span class="lightbox-flag-dot"></span>
                            <span class="lightbox-flag-label" x-text="f.label"></span>
                        </button>
                    </template>
                </div>

                <div class="comments-section">
                    <h3>Comments</h3>
                    <div x-show="commentsLoading" class="comments-loading">loading...</div>
                    <template x-if="!commentsLoading">
                        <div>
                            <template x-for="comment in (lightboxPhoto?.comments || [])" :key="comment.id">
                                <div class="comment">
                                    <p x-text="comment.body"></p>
                                </div>
                            </template>
                            <form @submit.prevent="addComment()" class="comment-form">
                                <textarea x-model="newComment" placeholder="Leave a comment..." rows="2"></textarea>
                                <button type="submit" :disabled="!newComment.trim()">Send</button>
                            </form>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function galleryApp() {
    const token = "{{ gallery.token }}";
    const csrfToken = getCookie('csrftoken');
    const cards = [...document.querySelectorAll('.photo-card')];

    const flagDefs = [
        { color: 1, label: 'rose',     hex: '#d4857a', glow: 'rgba(212,133,122,0.35)' },
        { color: 2, label: 'lavender', hex: '#a888b8', glow: 'rgba(168,136,184,0.35)' },
        { color: 3, label: 'sage',     hex: '#88a888', glow: 'rgba(136,168,136,0.35)' },
        { color: 4, label: 'sky',      hex: '#7a9ab8', glow: 'rgba(122,154,184,0.35)' },
        { color: 5, label: 'amber',    hex: '#c4a050', glow: 'rgba(196,160,80,0.35)' },
        { color: 0, label: 'final',    hex: '#c45050', glow: 'rgba(196,80,80,0.35)' },
    ];

    // Parse flags from DOM
    const photoFlags = {};
    cards.forEach(el => {
        const id = parseInt(el.dataset.photoId);
        try {
            photoFlags[id] = JSON.parse(el.dataset.flags.replace(/'/g, '"'));
        } catch {
            photoFlags[id] = [];
        }
    });

    // Restore active flag from localStorage
    const storageKey = `gallery-flag-${token}`;
    let savedFlag = parseInt(localStorage.getItem(storageKey));
    if (isNaN(savedFlag) || savedFlag < 0 || savedFlag > 5) savedFlag = 1;

    return {
        flagDefs,
        photoFlags,
        activeFlag: savedFlag,
        lightboxOpen: false,
        currentIndex: 0,
        lightboxPhoto: null,
        commentsLoading: false,
        newComment: "",
        selectMode: false,
        selectedPhotos: [],

        get activeFlagStyle() {
            const f = this.flagDefs.find(d => d.color === this.activeFlag);
            return f ? `--active-flag-color: ${f.hex}; --active-flag-glow: ${f.glow}` : '';
        },

        onEscape() {
            if (this.lightboxOpen) {
                this.closeLightbox();
            } else if (this.selectMode) {
                this.toggleSelectMode();
            }
        },

        toggleSelectMode() {
            this.selectMode = !this.selectMode;
            if (!this.selectMode) this.selectedPhotos = [];
        },

        toggleSelect(photoId) {
            const idx = this.selectedPhotos.indexOf(photoId);
            if (idx === -1) {
                this.selectedPhotos.push(photoId);
            } else {
                this.selectedPhotos.splice(idx, 1);
            }
        },

        isSelected(photoId) {
            return this.selectedPhotos.includes(photoId);
        },

        setActiveFlag(color) {
            this.activeFlag = color;
            localStorage.setItem(storageKey, color);
        },

        // Open immediately, fetch comments in background
        openLightbox(index) {
            this.currentIndex = index;
            const card = cards[index];
            const id = parseInt(card.dataset.photoId);
            this.lightboxPhoto = {
                id,
                preview_url: card.dataset.previewUrl,
                filename: card.dataset.filename,
                comments: [],
            };
            this.lightboxOpen = true;
            this._fetchComments(id);
        },

        closeLightbox() {
            this.lightboxOpen = false;
        },

        prevPhoto() {
            if (this.currentIndex > 0) {
                this.currentIndex--;
                this._navigateTo(this.currentIndex);
            }
        },
        nextPhoto() {
            if (this.currentIndex < cards.length - 1) {
                this.currentIndex++;
                this._navigateTo(this.currentIndex);
            }
        },

        _navigateTo(index) {
            const card = cards[index];
            const id = parseInt(card.dataset.photoId);
            this.lightboxPhoto = {
                id,
                preview_url: card.dataset.previewUrl,
                filename: card.dataset.filename,
                comments: [],
            };
            this._fetchComments(id);
        },

        async _fetchComments(id) {
            this.commentsLoading = true;
            try {
                const res = await fetch(`/g/${token}/photos/${id}/comments`);
                const comments = await res.json();
                // Only update if still viewing the same photo
                if (this.lightboxPhoto?.id === id) {
                    this.lightboxPhoto = { ...this.lightboxPhoto, comments };
                }
            } finally {
                if (this.lightboxPhoto?.id === id) {
                    this.commentsLoading = false;
                }
            }
        },

        async toggleFlag(photoId, color) {
            if (!photoId) return;
            const flagColor = color !== undefined ? color : this.activeFlag;

            // Optimistic update
            const current = [...(this.photoFlags[photoId] || [])];
            const idx = current.indexOf(flagColor);
            const wasActive = idx !== -1;
            if (wasActive) {
                current.splice(idx, 1);
            } else {
                current.push(flagColor);
            }
            this.photoFlags[photoId] = [...current];

            try {
                const res = await fetch(`/g/${token}/photos/${photoId}/flag?color=${flagColor}`, {
                    method: "POST",
                    headers: { "X-CSRFToken": csrfToken },
                });
                const data = await res.json();
                // Sync with confirmed server state
                const confirmed = [...(this.photoFlags[photoId] || [])];
                const serverIdx = confirmed.indexOf(flagColor);
                if (data.active && serverIdx === -1) {
                    confirmed.push(flagColor);
                } else if (!data.active && serverIdx !== -1) {
                    confirmed.splice(serverIdx, 1);
                }
                this.photoFlags[photoId] = [...confirmed];
            } catch {
                // Revert optimistic update on network error
                const reverted = [...(this.photoFlags[photoId] || [])];
                const revertIdx = reverted.indexOf(flagColor);
                if (wasActive && revertIdx === -1) {
                    reverted.push(flagColor);
                } else if (!wasActive && revertIdx !== -1) {
                    reverted.splice(revertIdx, 1);
                }
                this.photoFlags[photoId] = [...reverted];
            }
        },

        async addComment() {
            const body = this.newComment.trim();
            if (!body) return;
            const res = await fetch(`/g/${token}/photos/${this.lightboxPhoto.id}/comment`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrfToken,
                },
                body: JSON.stringify({ body }),
            });
            const comment = await res.json();
            this.lightboxPhoto.comments.push(comment);
            this.newComment = "";
        },
    };
}
</script>
{% endblock %}
